name: Auto Generador de Ejercicios (Cada Hora)

on:
  schedule:
    - cron: '0 * * * *' # Ejecuta automáticamente cada hora en punto
  workflow_dispatch: # Permite forzar la ejecución manual de prueba haciendo click en GitHub

permissions:
  contents: write # Permiso estricto y requerido para poder crear archivos nuevos en tu repositorio

jobs:
  generate-exercise:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código del Repositorio (Checkout)
        uses: actions/checkout@v4

      - name: Configurar Entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Script con Inteligencia Artificial
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generar_ejercicio.py

      - name: Confirmar y Guardar Archivo Nuevo en el Repositorio (Commit)
        run: |
          git config --global user.name "Vixxha-Bot"
          git config --global user.email "bot@vixxha.com"
          git add public/exercises/
          git commit -m "feat(exercises): Nuevo ejercicio generado por IA 🤖" || echo "No changes to commit"
          git push
